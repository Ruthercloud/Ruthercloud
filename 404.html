<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page Not Found - RutherCloud</title>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
background:#ffffff;
color:#0B1120;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
width:100%;
}

.lottie{
width:100%;
max-width:520px;
margin:auto;
margin-bottom:25px;
}

h1{
font-size:90px;
font-weight:700;
margin-bottom:10px;
color:#2563eb;
}

h2{
font-size:28px;
margin-bottom:15px;
}

p{
opacity:.7;
margin-bottom:30px;
}

a{
display:inline-block;
padding:16px 34px;
background:linear-gradient(90deg,#2563eb,#3b82f6);
color:white;
text-decoration:none;
border-radius:12px;
font-weight:600;
transition:.3s;
box-shadow:0 10px 25px rgba(37,99,235,.25);
}

a:hover{
transform:translateY(-3px);
box-shadow:0 18px 35px rgba(37,99,235,.35);
}

@media(max-width:600px){

.lottie{
max-width:320px;
}

h1{
font-size:65px;
}

h2{
font-size:22px;
}

}

</style>


</head>

<body>
<div class="container">

<lottie-player
class="lottie"
src="/assets/json/Page Not Found 404.json"
background="transparent"
speed="1"
loop
autoplay>
</lottie-player>

<h1>404</h1>
<h2>Oops! Page Not Found</h2>
<p>The page you are looking for doesn’t exist.</p>

<a href="/">Go Home</a>

</div>

</body>
</html>
